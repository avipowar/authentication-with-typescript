services: 
  postgresDb:
    image: postgres:17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB : chaiCode
    volumes:
      - 'postgres_data:/var/lib/postgresql/data' // the folder inside the container where PostgreSQL stores its data

volumes:
  postgres_data:
